proxy-groups:
  - name: "节点选择"
    type: select
    proxies:
      - 自动选择
      - "FIX03-Hysteria"
      - "FIX04-TUIC"
      - "FIX01-VLESS"
      - "cdn-main"
      - "dianxin"
      - "FIX02-VMess"
      - "wendi"
      - "yx"
      - DIRECT
  - name: "自动选择"
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - "FIX03-Hysteria"
      - "FIX04-TUIC"
      - "FIX01-VLESS"
      - "cdn-main"
      - "dianxin"
      - "FIX02-VMess"
      - "wendi"
      - "yx"
  - name: "ChatGPT-Clude"
    type: select
    proxies:
      - "节点选择"
      - "自动选择"
      - DIRECT
  - name: "国内服务"
    type: select
    proxies:
      - DIRECT
      - "节点选择"
  - name: "漏网之鱼"
    type: select
    proxies:
      - "节点选择"
      - "自动选择"
      - DIRECT

