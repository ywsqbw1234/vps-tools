      - "dianxin"
      - "FIX02-VMess"
      - "wendi"
      - "yx"
      - DIRECT
  - name: "自动选择"
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - "FIX03-Hysteria"
      - "FIX04-TUIC"
      - "FIX01-VLESS"
      - "cdn-main"
      - "dianxin"
      - "FIX02-VMess"
      - "wendi"
      - "yx"
  - name: "ChatGPT-Clude"
