mixed-port: 7890
allow-lan: true
mode: rule
log-level: info

dns:
  enable: true
  enhanced-mode: redir-host
  nameserver: [223.5.5.5,119.29.29.29]
  fallback: [1.1.1.1,8.8.8.8]

proxies:
  - name: "FIX03-Hysteria"
    type: hysteria
    server: 103.158.228.187
    port: 443
    tls: true
    udp: true
  - name: "FIX04-TUIC"
    type: tuic
    server: 103.158.228.187
    port: 443
    tls: true
    udp: true
  - name: "FIX01-VLESS"
    type: vless
    server: 103.158.228.187
    port: 443
    uuid: 00000000-0000-0000-0000-000000000000
    tls: true
    udp: true
  - name: "cdn-main"
    type: vless
    server: cdn.ywsqbw.uk
    port: 443
    uuid: 00000000-0000-0000-0000-000000000000
    tls: true
    udp: true
  - name: "dianxin"
    type: vless
    server: cf.877774.xyz
    port: 443
    uuid: 00000000-0000-0000-0000-000000000000
    tls: true
    udp: true
  - name: "FIX02-VMess"
    type: vmess
    server: 103.158.228.187
    port: 443
    uuid: 00000000-0000-0000-0000-000000000000
    tls: true
    udp: true
  - name: "wendi"
    type: vmess
    server: 162.159.39.162
    port: 443
    uuid: 00000000-0000-0000-0000-000000000000
    tls: true
    udp: false
  - name: "yx"
    type: vmess
    server: 108.162.198.205
    port: 443
    uuid: 00000000-0000-0000-0000-000000000000
    tls: true
    udp: false

proxy-groups:
  - name: "节点选择"
    type: select
    proxies:
      - 自动选择
      - "FIX03-Hysteria"
      - "FIX04-TUIC"
      - "FIX01-VLESS"
      - "cdn-main"
      - "dianxin"
      - "FIX02-VMess"
      - "wendi"
      - "yx"
      - DIRECT
  - name: "自动选择"
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - "FIX03-Hysteria"
      - "FIX04-TUIC"
      - "FIX01-VLESS"
      - "cdn-main"
      - "dianxin"
      - "FIX02-VMess"
      - "wendi"
      - "yx"
  - name: "ChatGPT-Clude"
    type: select
    proxies:
      - "节点选择"
      - "自动选择"
      - DIRECT
  - name: "国内服务"
    type: select
    proxies:
      - DIRECT
      - "节点选择"
  - name: "漏网之鱼"
    type: select
    proxies:
      - "节点选择"
      - "自动选择"
      - DIRECT

rules:
  - PROCESS-NAME,Xshell.exe,DIRECT
  - PROCESS-NAME,ssh.exe,DIRECT
  - IP-CIDR,103.158.228.187/32,DIRECT,no-resolve
  - DOMAIN-SUFFIX,ywsqbw.uk,DIRECT
  - DOMAIN,cdn.ywsqbw.uk,DIRECT
  - DST-PORT,22,DIRECT
  - DOMAIN-SUFFIX,openai.com,ChatGPT-Clude
  - DOMAIN-SUFFIX,chatgpt.com,ChatGPT-Clude
  - DOMAIN-SUFFIX,oaistatic.com,ChatGPT-Clude
  - DOMAIN-SUFFIX,oaiusercontent.com,ChatGPT-Clude
  - DOMAIN-SUFFIX,auth0.com,ChatGPT-Clude
  - DOMAIN-KEYWORD,openai,ChatGPT-Clude
  - DOMAIN-SUFFIX,cn,国内服务
  - GEOIP,CN,国内服务
  - MATCH,漏网之鱼
